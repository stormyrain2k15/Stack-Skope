syntax = "proto3";

package stackscope.v1;

import "events.proto";

option csharp_namespace = "StackScope.Proto.V1";

// A worker (Python PyTorch, llama.cpp harness, TF, etc.) implements this
// service. The coordinator is the client. Workers never load models
// in-process to the UI — always across a gRPC boundary.
service InferenceWorker {
  rpc GetCapabilities(CapabilitiesRequest) returns (CapabilitiesReply);
  rpc LoadModel(LoadModelRequest)          returns (LoadModelReply);
  rpc UnloadModel(UnloadModelRequest)      returns (UnloadModelReply);

  // Begins an inference transaction. The worker streams Events until it
  // sends the terminal EVENT_TOKEN_END with `finished=true` marker OR closes
  // the stream. Cancellation is via client cancel.
  rpc RunInference(RunInferenceRequest) returns (stream Event);

  // Reads back a tensor slice previously referenced by an Event.
  rpc ReadTensor(ReadTensorRequest) returns (ReadTensorReply);

  // Heartbeat / liveness. Also reports worker resource use so the UI can
  // surface partial captures if the worker dies.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatReply);
}

message CapabilitiesRequest {}
message CapabilitiesReply {
  string worker_kind          = 1;   // "pytorch", "llamacpp", "tf"
  string version              = 2;
  repeated string supported_formats = 3;  // "safetensors", "gguf", ...
  repeated string devices     = 4;   // "cuda:0", "cpu"
  bool   supports_attention   = 5;
  bool   supports_activations = 6;
  bool   supports_tensor_readback = 7;
}

message LoadModelRequest {
  string model_path   = 1;   // absolute path or repo id
  string format       = 2;   // "safetensors" | "gguf" | "hf_repo" | "savedmodel"
  string device       = 3;   // "cuda:0" | "cpu" | ...
  bool   trust_remote_code = 4;
  int32  n_ctx        = 5;   // llama.cpp / transformers window
}
message LoadModelReply {
  string model_handle = 1;
  string architecture = 2;   // as detected: "llama", "gemma", ...
  int32  n_layers     = 3;
  int32  n_heads      = 4;
  int32  hidden_size  = 5;
  int32  vocab_size   = 6;
}

message UnloadModelRequest { string model_handle = 1; }
message UnloadModelReply {}

message RunInferenceRequest {
  string transaction_id = 1;   // ULID; assigned by coordinator
  string model_handle   = 2;
  string prompt         = 3;
  int32  max_new_tokens = 4;
  float  temperature    = 5;
  float  top_p          = 6;
  int32  top_k          = 7;
  uint64 seed           = 8;

  // Progressive disclosure: worker only pays capture cost for what the UI
  // asks for. Coordinator forwards the current mode.
  CaptureLevel capture_level = 9;

  // Optional attention ablation: when both are set, the top-level
  // attention module at `ablate_layer` has its output for head
  // `ablate_head` zeroed before returning. Use -1 for "no ablation".
  int32 ablate_layer = 10;
  int32 ablate_head  = 11;
}

enum CaptureLevel {
  CAPTURE_SIMPLE   = 0;   // tokens, layers, logits only
  CAPTURE_ADVANCED = 1;   // + attention, activations
  CAPTURE_FORENSIC = 2;   // + tensor slices, per-op timings
}

message ReadTensorRequest {
  string transaction_id = 1;
  uint64 event_id       = 2;
  int64  byte_offset    = 3;
  int64  byte_length    = 4;
}
message ReadTensorReply {
  bytes  data           = 1;
  string dtype          = 2;
  repeated int64 shape  = 3;
}

message HeartbeatRequest {}
message HeartbeatReply {
  int64  uptime_ns     = 1;
  uint64 rss_bytes     = 2;
  uint64 vram_bytes    = 3;
  uint32 active_txns   = 4;
}
