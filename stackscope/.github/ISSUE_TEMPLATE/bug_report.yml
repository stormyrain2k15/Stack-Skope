name: Bug report
description: Something isn't working in StackScope. Fill in all five fields — we need them.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### Before you file
        We need five things to fix your bug:

        1. **Capture ULID** — the transaction id shown in the title bar of the app, or the folder name under `%APPDATA%/StackScope/captures/`.
        2. **Build SHA** — `stackscope --version` in a terminal, or the About dialog.
        3. **Reproducibility manifest** — run `stackscope-manifest --emit > manifest.json` and paste the contents. If StackScope refuses to start, run `python -m stackscope_worker.manifest --emit` from the worker install directory.
        4. **First anomalous event ULID** — the event id of the row you first noticed the problem on.
        5. **Command line + env** — how you launched the run.

        No stubs. No screenshots-only reports. Screenshots are welcome ALONGSIDE the five fields above.
  - type: input
    id: capture_ulid
    attributes:
      label: Capture ULID (transaction id)
      placeholder: "01HKQZ9V8W4Y2C1S6Q7BX3H9NA"
    validations:
      required: true
  - type: input
    id: build_sha
    attributes:
      label: Build SHA / version
      placeholder: "0.1.0 (a1b2c3d)"
    validations:
      required: true
  - type: textarea
    id: manifest
    attributes:
      label: Reproducibility manifest (paste JSON)
      description: Output of `stackscope-manifest --emit`.
      render: json
    validations:
      required: true
  - type: input
    id: first_event_ulid
    attributes:
      label: First anomalous event ULID
      placeholder: "01HKQZ9V8W4Y2C1S6Q7BX3H9NB"
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - WPF Desktop UI
        - Core (transactions / correlation / storage)
        - Format adapter (safetensors / GGUF / TF / transformers)
        - Architecture adapter (Llama / Gemma / Qwen / Mistral / GPT-2)
        - Driver capture — CUDA (CUPTI)
        - Driver capture — ROCm
        - Driver capture — Vulkan
        - Driver capture — CPU
        - Python inference worker
        - llama.cpp worker
        - Coordinator / gRPC
        - MSI installer / packaging
        - CLI (repro / tail / dry-run / bundle / mcp)
        - Docs / build scripts
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS + GPU + driver
      placeholder: "Windows 10 Pro 22H2, RTX 4090, driver 555.99, CUDA 12.5"
    validations:
      required: true
  - type: textarea
    id: cmdline
    attributes:
      label: Command line + environment
      description: Full invocation and any relevant env vars.
      render: shell
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs. actual behaviour. Include event ULIDs where possible.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / capture excerpts
      description: Attach or paste worker + coordinator logs. Redact model paths if sensitive.
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I ran `stackscope-repro <capture>` and included the drift report if any.
          required: false
        - label: I can reproduce this on the latest `main`.
          required: false
